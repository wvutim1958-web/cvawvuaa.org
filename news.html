<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>About • CVCWVUAA</title><style>:root{--ink:#0b2545; --blue:#1b4d8a; --gold:#ffb81c; --bg:#f6f8fb; --muted:#5b6777}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font:16px/1.6 system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:#0f172a}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
.wrapper{max-width:1100px;margin:auto;padding:20px}
header.site{background:linear-gradient(180deg,#0b2545 0%,#153a6b 100%);color:#fff}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px}
.brand-wrap{display:flex;justify-content:center;align-items:center;width:100%;padding:12px 0}
.brand img{width:72px;height:72px;border-radius:12px;object-fit:cover;display:block;box-shadow:0 1px 3px rgba(0,0,0,.25)}
nav{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;padding-bottom:10px}
nav a{color:#ffd56e;margin:0 4px;font-weight:600}
nav a.active{border-bottom:2px solid var(--gold)}
.hero{padding:36px 20px;color:#fff;background:linear-gradient(90deg,#153a6b 0%, #1b4d8a 60%, #2b6cb0 100%)}
.hero h2{margin:0 0 8px 0}
.grid{display:grid;gap:18px}
@media(min-width:720px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1024px){.grid{grid-template-columns:repeat(3,1fr)}}
.card{background:#fff;border:1px solid #e6e9ef;border-radius:14px;padding:18px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.card h3{margin:0 0 10px 0;font-size:18px;color:var(--ink)}
footer.site{margin-top:32px;padding:18px;border-top:1px solid #e6e9ef;color:var(--muted);background:#fff}
.note{background:#fff7e5;border:1px solid #ffe1a6;color:#5a4100;padding:12px;border-radius:10px}
.btn{display:inline-block;background:var(--gold);color:#241e00;font-weight:700;padding:10px 14px;border-radius:10px}
.btn:hover{filter:brightness(0.95);text-decoration:none}
ul.clean{margin:0;padding-left:18px}
.small{font-size:14px;color:var(--muted)}
.section{margin:22px 0}
img.full{width:100%;border-radius:14px}
.table{width:100%;border-collapse:collapse}
.table th,.table td{border:1px solid #e6e9ef;padding:10px;text-align:left}
.badge{display:inline-block;background:#e9eef7;border:1px solid #d4deee;border-radius:999px;padding:6px 10px;font-weight:600;color:#113a7a}
.paybox{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.paybtn{display:inline-flex;align-items:center;gap:8px;background:#003087;color:#fff;border-radius:10px;padding:10px 14px;text-decoration:none;font-weight:700}
.kbd{background:#eee;border-radius:6px;padding:2px 6px;border:1px solid #d0d7de}
.tiles{display:grid;gap:16px}
@media(min-width:900px){.tiles{grid-template-columns:repeat(3,1fr)}}
