<body>
<header class="site"><div class="wrapper"><a class="brand" href="/"><img src="/assets/logo.png" alt="CVCWVUAA"></a></div></header>
<main><div class="wrapper">
  <h2>RSVP</h2>
  <form action="mailto:president@cvawvuaa.org" method="post" enctype="text/plain">
    <div class="form-grid">
      <div><label>Name<br><input type="text" name="Name" required></label></div>
      <div><label>Game / Event<br><input id="game" type="text" name="Game" required></label></div>
      <div><label>How many?<br><input type="number" name="Count" min="1" value="1" required></label></div>
      <div><label>Special requests<br><input type="text" name="Requests"></label></div>
    </div>
    <p><button type="submit" class="btn">Send RSVP</button> <a class="btn" href="/events.html">Back to Events</a></p>
    <p class="small">This opens your email app. Prefer a hosted form? We can publish one.</p>
  </form>
</div></main>
<script>
const params=new URLSearchParams(location.search);const g=params.get('game');if(g){document.getElementById('game').value=g;}
</script>
