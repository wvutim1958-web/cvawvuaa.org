<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'>
<title>RSVP</title>
<link rel="stylesheet" href="/css/styles.css"><link rel="icon" href="/assets/favicon.png">
<link rel="stylesheet" href="/assets/site-fixes.css">
</head>
<body>
<header class='site'>
  <div class='brand-wrap'><a class='brand' href='/index.html'><img src='/assets/logo.png' alt='CVCWVUAA'></a></div>
  <nav><a href='/index.html'>Home</a><a href='/events.html' class='active'>Events</a></nav>
</header>
<main><div class="wrapper">
  <h2>RSVP</h2>
  <form action="mailto:president@cvawvuaa.org" method="post" enctype="text/plain">
    <p><label>Name<br><input type="text" name="Name" required></label></p>
    <p><label>Game / Event<br><input type="text" name="Game" required></label></p>
    <p><label>How many?<br><input type="number" name="Count" min="1" value="1" required></label></p>
    <p><label>Special requests<br><textarea name="Requests" rows="4"></textarea></label></p>
    <p><button type="submit" class="btn">Send RSVP</button> <a class="btn" href="/events.html">Back to Events</a></p>
    <p class="small">Note: This uses your email app to send the RSVP. If you'd like a hosted form, I can wire it up.</p>
  </form>
</div></main>
<footer class="site-footer"><div class="wrapper small">© CVCWVUAA</div></footer>
</body></html>
